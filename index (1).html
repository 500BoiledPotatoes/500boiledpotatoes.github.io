<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lu Jingyu — Systems & HPC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:      #0f0f0e;
      --gray:       #6b6b67;
      --light-gray: #e6e4df;
      --bg:         #f8f7f4;
      --link:       #2a5db0;
      --serif:      'EB Garamond', Georgia, serif;
      --mono:       'DM Mono', 'Courier New', monospace;
      --glass-bg:       rgba(255,255,255,0.52);
      --glass-border:   rgba(255,255,255,0.88);
      --glass-shadow:   0 4px 28px rgba(0,0,0,0.07), 0 1px 4px rgba(0,0,0,0.05);
      --glass-hover-shadow: 0 10px 42px rgba(0,0,0,0.11), 0 2px 8px rgba(0,0,0,0.06);
    }

    html { font-size: 18px; scroll-behavior: smooth; }

    body {
      font-family: var(--serif);
      background: var(--bg);
      color: var(--black);
      line-height: 1.75;
      max-width: 740px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    /* ── NAV ── */
    nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 2.2rem 0 2rem;
      border-bottom: 1px solid var(--light-gray);
      margin-bottom: 3.5rem;
    }
    nav .logo { font-family: var(--mono); font-size: 0.72rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gray); }
    nav ul { list-style: none; display: flex; gap: 2rem; }
    nav a { font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; text-decoration: none; color: var(--gray); transition: color 0.15s; }
    nav a:hover { color: var(--black); }

    /* ── HERO ── */
    .hero { display: grid; grid-template-columns: 1fr auto; gap: 2.5rem; align-items: start; margin-bottom: 4rem; }
    .hero h1 { font-size: 2.7rem; font-weight: 400; line-height: 1.15; margin-bottom: 0.5rem; letter-spacing: -0.015em; }
    .hero h1 em { font-style: italic; }
    .subtitle { font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.13em; text-transform: uppercase; color: var(--gray); margin-bottom: 1.3rem; }
    .hero p { font-size: 1rem; color: #38382f; max-width: 470px; }
    .hero-links { display: flex; flex-wrap: wrap; gap: 0.55rem; margin-top: 1.5rem; }
    .hero-links a {
      font-family: var(--mono); font-size: 0.66rem; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--gray); text-decoration: none; border: 1px solid var(--light-gray);
      padding: 0.28rem 0.78rem; border-radius: 3px; transition: all 0.15s;
    }
    .hero-links a:hover { border-color: var(--black); color: var(--black); }
    .avatar {
      width: 108px; height: 108px; border-radius: 50%;
      overflow: hidden; flex-shrink: 0;
      box-shadow: 0 0 0 1px var(--light-gray);
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .avatar-fallback {
      width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
      background: var(--light-gray);
      font-family: var(--serif); font-size: 2.4rem; color: var(--gray); font-style: italic;
    }

    /* ── SECTION ── */
    section { margin-bottom: 3.8rem; }
    .section-label {
      font-family: var(--mono); font-size: 0.63rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--gray); margin-bottom: 1.35rem; display: flex; align-items: center; gap: 0.8rem;
    }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--light-gray); }

    /* ── ABOUT ── */
    .about-text p { font-size: 1rem; color: #2e2e2a; margin-bottom: 0.9rem; }
    .about-text p:last-child { margin-bottom: 0; }
    .about-text a { color: var(--link); text-decoration: none; }
    .about-text a:hover { text-decoration: underline; }

    /* ── SKILLS ── */
    .skills-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.8rem; margin-top: 0.5rem;
    }
    .skill-group { }
    .skill-group-label {
      font-family: var(--mono); font-size: 0.58rem; letter-spacing: 0.13em; text-transform: uppercase;
      color: var(--gray); margin-bottom: 0.4rem;
    }
    .tags { display: flex; flex-wrap: wrap; gap: 0.35rem; }
    .tag {
      font-family
